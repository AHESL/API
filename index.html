<div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-message" id="modalMessage"></div>
        <div class="modal-buttons">
            <button class="modal-btn confirm" id="modalConfirmBtn"></button>
            <button class="modal-btn cancel" id="modalCancelBtn"></button>
        </div>
    </div>
</div>

<div class="ai-edit-overlay" id="aiEditOverlay">
    <div class="ai-edit-header-bar">
        <button class="ai-edit-header-btn ai-edit-back-btn" id="aiEditBackBtn">返回</button>
        <button class="ai-edit-header-btn ai-edit-save-btn" id="aiEditSaveBtn">保存</button>
    </div>
    <div class="ai-edit-content" id="aiEditContent">
        <div class="ai-avatar-section" id="aiAvatarSection">
            <div class="ai-avatar-preview" id="aiAvatarPreview">
                <img src="AI-tx.jpg" alt="AI头像" style="width:100%;height:100%;object-fit:cover;">
            </div>
            <span class="ai-avatar-hint" id="aiAvatarHint">点击此图片修改头像</span>
        </div>

        <div class="crop-section" id="aiCropSection">
            <div class="crop-container" id="aiCropContainer">
                <img id="aiCropImage" src="" alt="裁剪">
            </div>
        </div>

        <div class="persona-toggle-row">
            <span class="persona-toggle-label">角色扮演</span>
            <div class="toggle-block" id="personaToggleBtn">关</div>
        </div>

        <div class="ai-input-group">
            <label class="ai-input-label">AI 昵称</label>
            <input type="text" class="ai-input-field" id="aiNicknameInput" placeholder="给AI起个名字吧" maxlength="10" disabled>
        </div>

        <div class="ai-input-group">
            <label class="ai-input-label">个人背景</label>
            <textarea class="ai-input-field large" id="aiBackgroundInput" placeholder="比如：上世纪公司总裁，身价过亿" disabled></textarea>
        </div>

        <div class="ai-input-group">
            <label class="ai-input-label">说话风格</label>
            <textarea class="ai-input-field large" id="aiStyleInput" placeholder="比如：严肃果断，说话简洁有力" disabled></textarea>
        </div>

        <div class="ai-input-group">
            <label class="ai-input-label">个人性格</label>
            <textarea class="ai-input-field large" id="aiPersonalityInput" placeholder="比如：稳重、有决断力" disabled></textarea>
        </div>
    </div>
    <input type="file" id="aiFileInput" accept="image/*">
</div>

<script src="SYjs/main.js"></script>
</script>
